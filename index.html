<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Notes Board - Deterministic Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <h1>Sticky Board</h1>
        <button id="action-create" class="btn btn-primary" aria-haspopup="dialog" aria-controls="workspace-overlay">+ Create New Note</button>
    </header>

    <main class="app-board">
        <div id="notes-canvas" class="notes-grid"></div>
    </main>

    <div id="workspace-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="workspace-title">
        <div class="modal-surface">
            <h2 id="workspace-title">Note Composer</h2>
            <div class="form-group">
                <label for="workspace-buffer">Note Content</label>
                <textarea id="workspace-buffer" placeholder="Write your note here... (Max 50 words)"></textarea>
                <div id="error-banner-empty" class="error-banner hidden" role="alert">Submission blocked: Empty text not allowed.</div>
                <div id="error-banner-limit" class="error-banner hidden" role="alert">Submission blocked: Max 50 words allowed.</div>
            </div>
            <div class="form-actions">
                <button id="action-cancel" class="btn btn-secondary">Cancel</button>
                <button id="action-save" class="btn btn-success">Save Note</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
